<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Picker</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="grain"></div>
  <div class="app">
    <header class="header">
      <div class="header-top">
        <div class="logo">
          <span class="logo-icon">&#127916;</span>
          <span class="logo-text">MOVIE PICKER</span>
        </div>
        <div class="auth-bar">
          <button class="auth-btn auth-btn-ghost" id="browseBtn">Browse Films</button>
          <span class="auth-user hidden" id="authUser"></span>
          <button class="auth-btn" id="loginBtn">Sign In</button>
          <button class="auth-btn auth-btn-ghost hidden" id="logoutBtn">Sign Out</button>
        </div>
      </div>
      <p class="subtitle">500 films. One random pick. Zero regrets.</p>
    </header>

    <main class="main">
      <div class="card" id="movieCard">
        <div class="card-inner" id="cardInner">
          <div class="card-placeholder" id="placeholder">
            <div class="placeholder-icon">?</div>
            <p>Your next favorite movie is one click away</p>
          </div>
          <div class="card-result hidden" id="result">
            <div class="result-label">TONIGHT YOU WATCH</div>
            <h1 class="result-title" id="movieTitle"></h1>
            <div class="result-number" id="movieNumber"></div>
            <button class="watched-btn hidden" id="watchedBtn">
              <span class="watched-btn-icon">&#10003;</span>
              <span class="watched-btn-text">Mark as Watched</span>
            </button>
          </div>
        </div>
      </div>

      <div class="controls">
        <button class="btn btn-primary" id="pickBtn">
          <span class="btn-text">Pick a Movie</span>
          <span class="btn-icon">&#10132;</span>
        </button>
        <div class="watched-filter hidden" id="watchedFilter">
          <label class="toggle-label">
            <input type="checkbox" id="filterWatched" checked>
            <span class="toggle-track"></span>
            <span class="toggle-text">Skip watched movies</span>
          </label>
        </div>
      </div>

      <div class="history hidden" id="historySection">
        <h3 class="history-title">Previously Picked</h3>
        <div class="history-list" id="historyList"></div>
      </div>
    </main>

    <footer class="footer">
      <p>Curated from 500 acclaimed films across every era and genre</p>
    </footer>
  </div>

  <!-- Auth Modal -->
  <div class="modal-overlay hidden" id="authModal">
    <div class="modal">
      <button class="modal-close" id="modalClose">&#10005;</button>

      <!-- Login / Register tabs -->
      <div class="modal-tabs" id="modalTabs">
        <button class="modal-tab active" data-tab="login">Sign In</button>
        <button class="modal-tab" data-tab="register">Register</button>
      </div>

      <!-- Login form -->
      <form class="modal-form" id="loginForm">
        <h2 class="modal-title">Welcome back</h2>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="loginUsername" placeholder="your username" required autocomplete="username">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Your password" required autocomplete="current-password">
        </div>
        <p class="form-error hidden" id="loginError"></p>
        <button type="submit" class="btn btn-primary btn-full">
          <span>Continue</span>
        </button>
      </form>

      <!-- Register form -->
      <form class="modal-form hidden" id="registerForm">
        <h2 class="modal-title">Create account</h2>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="registerUsername" placeholder="choose a username" required autocomplete="username">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="registerPassword" placeholder="Min. 8 characters" required autocomplete="new-password">
        </div>
        <p class="form-error hidden" id="registerError"></p>
        <button type="submit" class="btn btn-primary btn-full">
          <span>Create Account</span>
        </button>
      </form>

    </div>
  </div>

  <!-- Browser Overlay -->
  <div class="browser-overlay hidden" id="browserOverlay">
    <div class="browser-panel">
      <div class="browser-header">
        <div class="browser-header-info">
          <h2 class="browser-title">All Films</h2>
          <span class="browser-watched-count" id="browserWatchedCount"></span>
        </div>
        <div class="browser-header-actions">
          <div class="browser-sort-group" id="browserSortGroup">
            <button class="browser-sort-btn active" data-sort="index">Curated</button>
            <button class="browser-sort-btn" data-sort="alpha">A–Z</button>
          </div>
          <button class="browser-close" id="browserClose">&#10005;</button>
        </div>
      </div>
      <div class="browser-search-wrap">
        <span class="browser-search-icon">&#128269;</span>
        <input type="search" class="browser-search" id="browserSearch" placeholder="Search 500 films…" autocomplete="off">
        <button class="browser-search-clear hidden" id="browserSearchClear">&#10005;</button>
      </div>
      <p class="browser-results-count hidden" id="browserResultsCount"></p>
      <div class="browser-list" id="browserList"></div>
    </div>
  </div>

  <script src="movies.js"></script>
  <script src="app.js"></script>
</body>
</html>
