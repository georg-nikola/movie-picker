<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Picker</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="grain"></div>
  <div class="app">
    <header class="header">
      <div class="header-top">
        <div class="logo">
          <span class="logo-icon">&#127916;</span>
          <span class="logo-text">MOVIE PICKER</span>
        </div>
        <div class="auth-bar">
          <span class="auth-user hidden" id="authUser"></span>
          <button class="auth-btn" id="loginBtn">Sign In</button>
          <button class="auth-btn auth-btn-ghost hidden" id="logoutBtn">Sign Out</button>
        </div>
      </div>
      <p class="subtitle">500 films. One random pick. Zero regrets.</p>
    </header>

    <main class="main">
      <div class="card" id="movieCard">
        <div class="card-inner" id="cardInner">
          <div class="card-placeholder" id="placeholder">
            <div class="placeholder-icon">?</div>
            <p>Your next favorite movie is one click away</p>
          </div>
          <div class="card-result hidden" id="result">
            <div class="result-label">TONIGHT YOU WATCH</div>
            <h1 class="result-title" id="movieTitle"></h1>
            <div class="result-number" id="movieNumber"></div>
            <button class="watched-btn hidden" id="watchedBtn">
              <span class="watched-btn-icon">&#10003;</span>
              <span class="watched-btn-text">Mark as Watched</span>
            </button>
          </div>
        </div>
      </div>

      <div class="controls">
        <button class="btn btn-primary" id="pickBtn">
          <span class="btn-text">Pick a Movie</span>
          <span class="btn-icon">&#10132;</span>
        </button>
        <div class="watched-filter hidden" id="watchedFilter">
          <label class="toggle-label">
            <input type="checkbox" id="filterWatched" checked>
            <span class="toggle-track"></span>
            <span class="toggle-text">Skip watched movies</span>
          </label>
        </div>
      </div>

      <div class="history hidden" id="historySection">
        <h3 class="history-title">Previously Picked</h3>
        <div class="history-list" id="historyList"></div>
      </div>
    </main>

    <footer class="footer">
      <p>Curated from 500 acclaimed films across every era and genre</p>
    </footer>
  </div>

  <!-- Auth Modal -->
  <div class="modal-overlay hidden" id="authModal">
    <div class="modal">
      <button class="modal-close" id="modalClose">&#10005;</button>

      <!-- Login / Register tabs -->
      <div class="modal-tabs" id="modalTabs">
        <button class="modal-tab active" data-tab="login">Sign In</button>
        <button class="modal-tab" data-tab="register">Register</button>
      </div>

      <!-- Login form -->
      <form class="modal-form" id="loginForm">
        <h2 class="modal-title">Welcome back</h2>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Your password" required autocomplete="current-password">
        </div>
        <p class="form-error hidden" id="loginError"></p>
        <button type="submit" class="btn btn-primary btn-full">
          <span>Continue</span>
        </button>
      </form>

      <!-- Register form -->
      <form class="modal-form hidden" id="registerForm">
        <h2 class="modal-title">Create account</h2>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="registerEmail" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="registerPassword" placeholder="Min. 8 characters" required autocomplete="new-password">
        </div>
        <p class="form-error hidden" id="registerError"></p>
        <button type="submit" class="btn btn-primary btn-full">
          <span>Create Account</span>
        </button>
      </form>

      <!-- OTP verify form -->
      <form class="modal-form hidden" id="otpForm">
        <h2 class="modal-title">Check your email</h2>
        <p class="modal-hint">We sent a 6-digit code to <strong id="otpEmail"></strong></p>
        <div class="form-group">
          <label>Verification Code</label>
          <input type="text" id="otpCode" placeholder="123456" maxlength="6" inputmode="numeric" required autocomplete="one-time-code">
        </div>
        <p class="form-error hidden" id="otpError"></p>
        <button type="submit" class="btn btn-primary btn-full">
          <span>Verify</span>
        </button>
        <button type="button" class="btn-link" id="otpResend">Resend code</button>
      </form>
    </div>
  </div>

  <script src="movies.js"></script>
  <script src="app.js"></script>
</body>
</html>
