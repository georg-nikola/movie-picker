{{- if .Values.ingress.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "movie-picker-api.fullname" . }}
  labels:
    {{- include "movie-picker-api.labels" . | nindent 4 }}
spec:
  entryPoints:
    - web
    - websecure
  routes:
    # Auth endpoints: rate-limited to 10 req/min per IP
    - match: Host(`{{ .Values.ingress.host }}`) && PathPrefix(`/api/auth`)
      kind: Rule
      priority: 110
      middlewares:
        - name: {{ include "movie-picker-api.fullname" . }}-auth-ratelimit
      services:
        - name: {{ include "movie-picker-api.fullname" . }}
          port: {{ .Values.service.port }}
    # All other API routes: no rate limit
    - match: Host(`{{ .Values.ingress.host }}`) && PathPrefix(`/api`)
      kind: Rule
      priority: 100
      services:
        - name: {{ include "movie-picker-api.fullname" . }}
          port: {{ .Values.service.port }}
{{- end }}
